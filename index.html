<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding – Vítej na palubě</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <div class="container landing">

        <!-- Logo / titul -->
        <div class="header">
            <h1>⚓ Vítej na palubě!</h1>
            <p>Vyber svou roli a vydej se na cestu.</p>
        </div>

        <!-- Obrázek úvodní (zatím placeholder) -->
        <div class="hero-image">
            <img src="img/landing-placeholder.png" alt="Vítej" />
        </div>

        <!-- Výběr role -->
        <div class="role-select">
            <button class="btn-primary" onclick="window.location.href='tasks.html'">
                🚢 Jsem nováček (Plavčík)
            </button>

            <button class="btn-secondary" onclick="window.location.href='tutor.html'">
                🧭 Jsem tutor (Důstojník)
            </button>

            <button class="btn-secondary" onclick="window.location.href='admin.html'">
                ⚙️ Admin / trenér
            </button>
        </div>

        <footer class="footer">
            <p>© Onboarding Demo • Makro styl • verze HTML</p>
        </footer>

    </div>

</body>
</html>
